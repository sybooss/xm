services:
  mysql:
    image: mysql:8.4
    container_name: returns-assistant-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      MYSQL_DATABASE: test3
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./sql/migration-20260505-add-user-password.sql:/docker-entrypoint-initdb.d/03-user-password.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-1234}"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    container_name: returns-assistant-server
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/test3?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      AI_ENABLED: ${AI_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://host.docker.internal:8080/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      APP_AUTH_ADMIN_PASSWORD: ${APP_AUTH_ADMIN_PASSWORD:-123456}
      APP_AUTH_CUSTOMER_PASSWORD: ${APP_AUTH_CUSTOMER_PASSWORD:-123456}
      APP_AUTH_TOKEN_HOURS: ${APP_AUTH_TOKEN_HOURS:-8}
    ports:
      - "${SERVER_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/system/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build:
      context: ./web
    container_name: returns-assistant-web
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-5173}:80"

volumes:
  mysql-data:
