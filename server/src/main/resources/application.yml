server:
  port: 8081

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:./server/.env[.properties]
  application:
    name: returns-assistant
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/test3?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:1234}

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

logging:
  level:
    org.springframework.jdbc.support.JdbcTransactionManager: info

app:
  auth:
    admin-password: ${APP_AUTH_ADMIN_PASSWORD:123456}
    customer-password: ${APP_AUTH_CUSTOMER_PASSWORD:123456}
    token-hours: ${APP_AUTH_TOKEN_HOURS:8}
    jwt-secret: ${APP_AUTH_JWT_SECRET:returns-assistant-dev-jwt-secret-change-me-2026}
    jwt-issuer: ${APP_AUTH_JWT_ISSUER:returns-assistant}
  ai:
    enabled: ${AI_ENABLED:true}
    provider: openai-compatible
    model-name: ${OPENAI_MODEL:gpt-4o-mini}
    model-options: ${OPENAI_MODEL_OPTIONS:gpt-4o-mini,gpt-4.1-mini,gpt-4.1,o4-mini}
    remote-models-enabled: ${OPENAI_REMOTE_MODELS_ENABLED:true}
    remote-models-cache-seconds: ${OPENAI_REMOTE_MODELS_CACHE_SECONDS:300}
    remote-models-timeout-seconds: ${OPENAI_REMOTE_MODELS_TIMEOUT_SECONDS:5}
    fallback-enabled: true
  provenance:
    c2pa:
      enabled: ${C2PA_ENABLED:true}
      tool-path: ${C2PATOOL_PATH:c2patool}
      timeout-seconds: ${C2PA_TIMEOUT_SECONDS:8}

langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      model-name: ${OPENAI_MODEL:gpt-4o-mini}
      temperature: ${OPENAI_TEMPERATURE:0.2}
      max-retries: ${OPENAI_MAX_RETRIES:2}
      timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:30}
      log-requests: false
      log-responses: false
