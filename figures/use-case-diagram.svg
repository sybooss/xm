<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <style>
      .title { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #111827; }
      .subtitle { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 18px; fill: #475569; }
      .sectionTitle { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 25px; font-weight: 700; }
      .text { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 22px; fill: #111827; text-anchor: middle; }
      .small { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 16px; fill: #475569; text-anchor: middle; }
      .actorText { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 23px; font-weight: 700; fill: #7c2d12; text-anchor: middle; }
      .system { fill: #f8fafc; stroke: #334155; stroke-width: 3; rx: 18; }
      .panelCustomer { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.5; rx: 16; }
      .panelAi { fill: #ecfdf5; stroke: #059669; stroke-width: 2.5; rx: 16; }
      .panelAdmin { fill: #fff7ed; stroke: #ea580c; stroke-width: 2.5; rx: 16; }
      .usecase { fill: #ffffff; stroke: #2563eb; stroke-width: 3; }
      .usecaseAi { fill: #ffffff; stroke: #059669; stroke-width: 3; }
      .usecaseAdmin { fill: #ffffff; stroke: #ea580c; stroke-width: 3; }
      .actorBox { fill: #fff7ed; stroke: #c2410c; stroke-width: 3; rx: 12; }
      .externalBox { fill: #eef2ff; stroke: #4338ca; stroke-width: 3; rx: 12; }
      .assoc { fill: none; stroke: #334155; stroke-width: 2.2; }
      .soft { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 7; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #cbd5e1; rx: 10; }
      .noteText { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 16px; fill: #475569; }
    </style>
