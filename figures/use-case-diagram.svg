  <path d="M1412 607 C1360 585 1310 570 1274 565" class="assoc"/>
  <path d="M1412 607 C1360 638 1310 676 1274 685" class="assoc"/>
  <path d="M1412 607 C1362 700 1310 780 1274 790" class="assoc"/>

  <path d="M800 925 L800 779" class="assoc"/>
  <path d="M800 925 C710 805 695 375 682 342" class="assoc"/>

  <path d="M578 600 C620 585 650 390 681 348" class="soft"/>
  <path d="M920 340 C955 365 982 380 1026 342" class="soft"/>
  <path d="M1026 685 C975 660 950 620 920 600" class="soft"/>

  <rect x="520" y="856" width="560" height="38" class="note"/>
  <text x="545" y="880" class="noteText">说明：AI 模块只作为增强层；售后审核、工单处理和本地规则兜底仍由业务系统保留。</text>
</svg>
