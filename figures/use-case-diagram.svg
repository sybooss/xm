  <rect width="1600" height="1000" fill="#ffffff"/>
  <text x="800" y="52" class="title" text-anchor="middle">电商退换货智能客服系统用例图</text>
  <text x="800" y="84" class="subtitle" text-anchor="middle">系统参与者、系统边界与核心用例关系，适用于课程报告和答辩展示</text>

  <rect x="255" y="130" width="1090" height="770" class="system"/>
  <text x="800" y="172" class="sectionTitle" text-anchor="middle" fill="#0f172a">系统边界：电商退换货智能客服系统</text>

  <rect x="300" y="220" width="300" height="610" class="panelCustomer"/>
  <text x="450" y="262" class="sectionTitle" text-anchor="middle" fill="#1e3a8a">客户侧用例</text>

  <rect x="650" y="220" width="300" height="610" class="panelAi"/>
  <text x="800" y="262" class="sectionTitle" text-anchor="middle" fill="#064e3b">AI 支撑用例</text>

  <rect x="1000" y="220" width="300" height="610" class="panelAdmin"/>
  <text x="1150" y="262" class="sectionTitle" text-anchor="middle" fill="#7c2d12">管理侧用例</text>

  <rect x="58" y="250" width="165" height="82" class="actorBox"/>
  <text x="140" y="286" class="actorText">游客</text>
  <text x="140" y="315" class="small">未登录用户</text>

  <circle cx="140" cy="545" r="28" fill="#fff7ed" stroke="#c2410c" stroke-width="3"/>
  <path d="M140 573 L140 642 M92 607 L188 607 M140 642 L96 720 M140 642 L184 720" class="assoc" stroke="#c2410c" stroke-width="3"/>
  <text x="140" y="765" class="actorText">客户</text>

  <circle cx="1460" cy="545" r="28" fill="#fff7ed" stroke="#c2410c" stroke-width="3"/>
  <path d="M1460 573 L1460 642 M1412 607 L1508 607 M1460 642 L1416 720 M1460 642 L1504 720" class="assoc" stroke="#c2410c" stroke-width="3"/>
  <text x="1460" y="765" class="actorText">客服/管理员</text>

  <rect x="705" y="925" width="190" height="58" class="externalBox"/>
  <text x="800" y="949" class="text" fill="#312e81">外部 AI</text>
  <text x="800" y="972" class="small" fill="#312e81">OpenAI-compatible / sub2api</text>

  <ellipse cx="450" cy="340" rx="118" ry="44" class="usecase"/>
  <text x="450" y="348" class="text">注册/登录</text>

  <ellipse cx="450" cy="465" rx="130" ry="52" class="usecase"/>
  <text x="450" y="456" class="text">售后自助</text>
  <text x="450" y="486" class="small">订单、申请、凭证、进度</text>

  <ellipse cx="450" cy="600" rx="130" ry="52" class="usecase"/>
  <text x="450" y="591" class="text">在线咨询</text>
  <text x="450" y="621" class="small">会话、订单上下文、问题</text>

  <ellipse cx="450" cy="735" rx="118" ry="44" class="usecase"/>
  <text x="450" y="743" class="text">提交服务评价</text>

  <ellipse cx="800" cy="340" rx="120" ry="44" class="usecaseAi"/>
  <text x="800" y="348" class="text">AI 智能辅助</text>

  <ellipse cx="800" cy="465" rx="120" ry="44" class="usecaseAi"/>
  <text x="800" y="457" class="text">意图识别</text>
  <text x="800" y="486" class="small">退货、换货、退款、物流</text>

  <ellipse cx="800" cy="600" rx="120" ry="44" class="usecaseAi"/>
  <text x="800" y="592" class="text">检索依据</text>
  <text x="800" y="621" class="small">订单与知识库规则</text>

  <ellipse cx="800" cy="735" rx="120" ry="44" class="usecaseAi"/>
  <text x="800" y="727" class="text">AI 测试与日志</text>
  <text x="800" y="756" class="small">模型切换、调用诊断</text>

  <ellipse cx="1150" cy="325" rx="126" ry="48" class="usecaseAdmin"/>
  <text x="1150" y="317" class="text">售后审核</text>
  <text x="1150" y="347" class="small">补材料、通过、驳回、完成</text>

  <ellipse cx="1150" cy="445" rx="126" ry="44" class="usecaseAdmin"/>
  <text x="1150" y="453" class="text">人工工单处理</text>

  <ellipse cx="1150" cy="565" rx="126" ry="44" class="usecaseAdmin"/>
  <text x="1150" y="573" class="text">订单与售后记录</text>

  <ellipse cx="1150" cy="685" rx="126" ry="44" class="usecaseAdmin"/>
  <text x="1150" y="693" class="text">知识库维护</text>

  <ellipse cx="1150" cy="790" rx="126" ry="44" class="usecaseAdmin"/>
  <text x="1150" y="782" class="text">SLA 与客户画像</text>
  <text x="1150" y="811" class="small">风险任务、客户聚合信息</text>

  <path d="M223 291 C265 305 310 328 333 338" class="assoc"/>
  <path d="M188 607 C245 515 300 385 333 344" class="assoc"/>
  <path d="M188 607 C250 555 300 485 323 468" class="assoc"/>
  <path d="M188 607 C250 603 300 602 320 600" class="assoc"/>
  <path d="M188 607 C250 675 300 725 333 734" class="assoc"/>

  <path d="M1412 607 C1360 500 1310 360 1274 328" class="assoc"/>
