<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <marker id="flowArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #111827; }
      .subtitle { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 18px; fill: #475569; }
      .laneTitle { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 25px; font-weight: 700; text-anchor: middle; }
      .text { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 22px; fill: #111827; text-anchor: middle; }
      .small { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 16px; fill: #475569; text-anchor: middle; }
      .startEnd { fill: #ffffff; stroke: #334155; stroke-width: 2.8; }
      .customer { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.7; rx: 12; }
      .admin { fill: #fff7ed; stroke: #ea580c; stroke-width: 2.7; rx: 12; }
      .system { fill: #f8fafc; stroke: #334155; stroke-width: 2.7; rx: 12; }
      .ai { fill: #ecfdf5; stroke: #059669; stroke-width: 2.7; rx: 12; }
      .decision { fill: #fef3c7; stroke: #d97706; stroke-width: 2.7; }
      .flow { fill: none; stroke: #334155; stroke-width: 2.2; marker-end: url(#flowArrow); }
      .flowSoft { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 7; marker-end: url(#flowArrow); }
      .tag { fill: #ffffff; stroke: #cbd5e1; rx: 7; }
      .label { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 16px; fill: #334155; text-anchor: middle; }
      .legend { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 16px; fill: #475569; }
    </style>
  </defs>

  <rect width="1800" height="1200" fill="#ffffff"/>
  <text x="900" y="52" class="title" text-anchor="middle">电商退换货智能客服系统业务流程图</text>
  <text x="900" y="84" class="subtitle" text-anchor="middle">左侧展示售后自助与审核闭环，右侧展示在线咨询、AI 增强、本地兜底和人工工单闭环</text>

  <rect x="90" y="130" width="795" height="980" fill="#f8fbff" stroke="#bfdbfe" stroke-width="2.5" rx="18"/>
  <rect x="915" y="130" width="795" height="980" fill="#f8fffb" stroke="#bbf7d0" stroke-width="2.5" rx="18"/>
  <text x="487" y="172" class="laneTitle" fill="#1e3a8a">售后自助与审核流程</text>
  <text x="1312" y="172" class="laneTitle" fill="#065f46">在线咨询与 AI 辅助流程</text>

  <ellipse cx="487" cy="230" rx="115" ry="36" class="startEnd"/>
  <text x="487" y="238" class="text">客户登录</text>

  <rect x="317" y="300" width="340" height="72" class="customer"/>
  <text x="487" y="328" class="text">查看订单</text>
  <text x="487" y="355" class="small">选择退换货 / 退款商品</text>

  <rect x="317" y="410" width="340" height="78" class="customer"/>
  <text x="487" y="440" class="text">提交售后申请</text>
  <text x="487" y="467" class="small">填写原因并上传凭证</text>

  <path d="M487 530 L622 610 L487 690 L352 610 Z" class="decision"/>
  <text x="487" y="605" class="text">订单与材料</text>
  <text x="487" y="633" class="text">是否合规</text>

  <rect x="125" y="570" width="210" height="80" class="system"/>
  <text x="230" y="601" class="text">提示补充</text>
  <text x="230" y="629" class="small">或修改材料</text>

  <rect x="642" y="570" width="210" height="80" class="system"/>
  <text x="747" y="601" class="text">创建申请</text>
  <text x="747" y="629" class="small">生成 SLA 和轨迹</text>

  <rect x="577" y="735" width="340" height="82" class="admin"/>
  <text x="747" y="765" class="text">客服/管理员审核</text>
  <text x="747" y="794" class="small">查看订单、凭证、知识库规则</text>

  <path d="M747 860 L882 940 L747 1020 L612 940 Z" class="decision"/>
  <text x="747" y="935" class="text">审核处理</text>
  <text x="747" y="963" class="small">补材料 / 驳回 / 通过</text>

  <rect x="205" y="900" width="260" height="80" class="admin"/>
  <text x="335" y="931" class="text">补材料或驳回</text>
  <text x="335" y="959" class="small">通知客户并记录原因</text>

  <rect x="585" y="1055" width="325" height="72" class="admin"/>
  <text x="747" y="1083" class="text">通过后处理</text>
  <text x="747" y="1110" class="small">退货、换货、退款并关闭申请</text>

  <ellipse cx="335" cy="1070" rx="130" ry="36" class="startEnd"/>
  <text x="335" y="1078" class="text">客户查看结果并评价</text>

  <ellipse cx="1312" cy="230" rx="125" ry="36" class="startEnd"/>
  <text x="1312" y="238" class="text">在线咨询入口</text>

  <rect x="1142" y="300" width="340" height="72" class="customer"/>
  <text x="1312" y="328" class="text">输入售后问题</text>
  <text x="1312" y="355" class="small">可绑定订单上下文</text>

  <rect x="1142" y="420" width="340" height="72" class="ai"/>
  <text x="1312" y="448" class="text">识别售后意图</text>
  <text x="1312" y="475" class="small">退货、换货、退款、物流、投诉</text>

  <rect x="1142" y="540" width="340" height="72" class="ai"/>
  <text x="1312" y="568" class="text">检索依据</text>
  <text x="1312" y="595" class="small">订单上下文与知识库规则</text>

  <path d="M1312 655 L1442 730 L1312 805 L1182 730 Z" class="decision"/>
  <text x="1312" y="724" class="text">AI 增强</text>
  <text x="1312" y="752" class="text">是否可用</text>

  <rect x="1002" y="860" width="265" height="80" class="ai"/>
  <text x="1135" y="891" class="text">生成 AI 增强回复</text>
  <text x="1135" y="919" class="small">展示依据与建议追问</text>

  <rect x="1360" y="860" width="265" height="80" class="system"/>
  <text x="1492" y="891" class="text">本地规则兜底</text>
  <text x="1492" y="919" class="small">AI 不可用时仍可回复</text>

  <path d="M1312 975 L1435 1045 L1312 1115 L1189 1045 Z" class="decision"/>
  <text x="1312" y="1040" class="text">客户问题</text>
  <text x="1312" y="1068" class="text">是否解决</text>

  <rect x="1010" y="1005" width="245" height="78" class="admin"/>
  <text x="1132" y="1034" class="text">转人工工单</text>
  <text x="1132" y="1062" class="small">投诉或复杂问题跟进</text>

  <ellipse cx="1512" cy="1045" rx="120" ry="36" class="startEnd"/>
  <text x="1512" y="1038" class="text">记录日志</text>
  <text x="1512" y="1064" class="small">沉淀调用、检索与轨迹</text>

  <path d="M487 266 L487 300" class="flow"/>
  <path d="M487 372 L487 410" class="flow"/>
  <path d="M487 488 L487 530" class="flow"/>
  <path d="M352 610 L335 610" class="flow"/>
  <rect x="358" y="572" width="42" height="26" class="tag"/>
  <text x="379" y="591" class="label">否</text>
  <path d="M230 570 C230 445 300 445 317 445" class="flowSoft"/>
  <path d="M622 610 L642 610" class="flow"/>
  <rect x="622" y="572" width="42" height="26" class="tag"/>
  <text x="643" y="591" class="label">是</text>
  <path d="M747 650 L747 735" class="flow"/>
  <path d="M747 817 L747 860" class="flow"/>
  <path d="M612 940 L465 940" class="flow"/>
  <rect x="552" y="902" width="62" height="26" class="tag"/>
  <text x="583" y="921" class="label">异常</text>
  <path d="M335 980 L335 1034" class="flow"/>
  <path d="M747 1020 L747 1055" class="flow"/>
  <rect x="770" y="1022" width="48" height="26" class="tag"/>
  <text x="794" y="1041" class="label">通过</text>
  <path d="M585 1092 C515 1115 420 1095 465 1070" class="flow"/>

  <path d="M1312 266 L1312 300" class="flow"/>
  <path d="M1312 372 L1312 420" class="flow"/>
  <path d="M1312 492 L1312 540" class="flow"/>
  <path d="M1312 612 L1312 655" class="flow"/>
  <path d="M1210 788 C1160 815 1135 845 1135 860" class="flow"/>
  <rect x="1195" y="806" width="42" height="26" class="tag"/>
  <text x="1216" y="825" class="label">是</text>
  <path d="M1416 788 C1468 815 1492 845 1492 860" class="flow"/>
  <rect x="1422" y="806" width="42" height="26" class="tag"/>
  <text x="1443" y="825" class="label">否</text>
  <path d="M1135 940 C1190 970 1235 1005 1189 1045" class="flow"/>
  <path d="M1492 940 C1455 975 1430 1010 1435 1045" class="flow"/>
  <path d="M1189 1045 L1255 1045" class="flow"/>
  <rect x="1190" y="1008" width="62" height="26" class="tag"/>
  <text x="1221" y="1027" class="label">未解决</text>
  <path d="M1435 1045 L1392 1045" class="flow"/>
  <rect x="1437" y="1008" width="62" height="26" class="tag"/>
  <text x="1468" y="1027" class="label">已解决</text>
  <path d="M1132 1005 C1035 890 950 810 917 776" class="flowSoft"/>

  <rect x="120" y="1135" width="520" height="42" fill="#ffffff" stroke="#cbd5e1" rx="8"/>
  <ellipse cx="166" cy="1156" rx="18" ry="13" class="customer"/>
  <text x="195" y="1162" class="legend">客户操作</text>
  <ellipse cx="335" cy="1156" rx="18" ry="13" class="admin"/>
  <text x="364" y="1162" class="legend">客服/管理员</text>
  <ellipse cx="520" cy="1156" rx="18" ry="13" class="ai"/>
  <text x="549" y="1162" class="legend">AI 支撑</text>
</svg>
